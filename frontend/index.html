<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kitab Mağazası - Giriş</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="image-section login-bg">
            <div class="overlay">
                <h2>Sehirli Səhifələr Dünyasına Xoş Gəlmisiniz</h2>
                <p>Ən son nəşrlər və klassik əsərlər bir klik uzağınızda.</p>
            </div>
        </div>
        <div class="form-section">
            <form id="loginForm" class="auth-form">
                <div class="logo">
                    <span class="icon">📚</span>
                    <h1>Kitab Dünyası</h1>
                </div>
                <h2>Hesabınıza daxil olun</h2>
                <p class="subtitle">Davam etmək üçün məlumatlarınızı daxil edin</p>
                
                <div id="errorMessage" class="error-message"></div>

                <div class="input-group">
                    <label for="email">E-poçt ünvanı</label>
                    <input type="email" id="email" name="email" placeholder="nume@example.com" required>
                </div>
                
                <div class="input-group">
                    <label for="password">Şifrə</label>
                    <input type="password" id="password" name="password" placeholder="Şifrənizi daxil edin" required>
                </div>

                <div class="form-options">
                    <label class="checkbox-container">
                        <input type="checkbox" id="remember">
                        <span class="checkmark"></span>
                        Məni xatırla
                    </label>
                    <a href="#" class="forgot-password">Şifrəni unutmusuz?</a>
                </div>

                <button type="submit" class="primary-btn">Daxil Ol</button>

                <p class="switch-page">Hesabınız yoxdur? <a href="register.html">Qeydiyyatdan keçin</a></p>
            </form>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
